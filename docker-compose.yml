version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: bybit_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    restart: unless-stopped

  bot:
    build: .
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data: